<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Strategy Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { margin-bottom: 40px; }
    h1 { font-size: 2.5em; color: #58a6ff; margin-bottom: 10px; }
    .subtitle { color: #8b949e; font-size: 1.1em; }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      background: #161b22;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid #30363d;
    }
    .search-box {
      flex: 1;
      min-width: 250px;
    }
    input, select {
      width: 100%;
      padding: 10px 15px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 1em;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #58a6ff;
    }
    .filter-box { width: 200px; }
    .last-updated {
      font-size: 0.9em;
      color: #8b949e;
      margin-bottom: 20px;
    }
    .doc-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 20px;
      transition: transform 0.2s;
    }
    .doc-card:hover { transform: translateY(-2px); border-color: #58a6ff; }
    .doc-title { font-size: 1.3em; color: #58a6ff; margin-bottom: 10px; font-weight: 600; }
    .doc-meta { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.8em;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .badge-org { background: #23863620; color: #3fb950; border-color: #3fb95040; }
    .badge-cat { background: #1f6feb20; color: #58a6ff; border-color: #58a6ff40; }
    .badge-date { background: #a371f720; color: #a371f7; border-color: #a371f740; }
    .badge-hist { background: #8b949e20; color: #8b949e; border-color: #8b949e40; }

    .doc-desc { color: #8b949e; margin-bottom: 15px; line-height: 1.5; }
    .doc-link {
      display: inline-block;
      color: #58a6ff;
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 0.9em;
    }
    .doc-link:hover { background: #21262d; border-color: #8b949e; }

    .no-results { text-align: center; padding: 40px; color: #8b949e; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Japan Strategy Monitor</h1>
      <p class="subtitle">Defensa, Política Exterior, Seguridad Económica y Derechos (Género/LGBT+)</p>
    </header>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar documentos por título o descripción...">
      </div>
      <div class="filter-box">
        <select id="categoryFilter">
          <option value="all">Todas las categorías</option>
          <option value="Defensa">Defensa</option>
          <option value="Política Exterior">Política Exterior</option>
          <option value="Seguridad Económica">Seguridad Económica</option>
          <option value="Género/LGBT+">Género/LGBT+</option>
          <option value="Archivo Histórico">Archivo Histórico</option>
        </select>
      </div>
    </div>

    <div id="lastUpdated" class="last-updated"></div>
    <div id="docList"></div>
  </div>

  <script>
    let allDocuments = [];
    async function fetchData() {
      try {
        const response = await fetch('documents.json?t=' + Date.now());
        const data = await response.json();
        allDocuments = data.documents;
        
        document.getElementById('lastUpdated').innerHTML = 
          `Última actualización: ${new Date(data.last_updated).toLocaleString()}`;
        
        renderDocuments(allDocuments);
      } catch (e) {
        document.getElementById('docList').innerHTML = '<p class="no-results">Error al cargar datos.</p>';
      }
    }

    function renderDocuments(docs) {
      const container = document.getElementById('docList');
      if (docs.length === 0) {
        container.innerHTML = '<p class="no-results">No se encontraron documentos.</p>';
        return;
      }

      container.innerHTML = docs.map(doc => {
        const badgeClass = doc.category === 'Archivo Histórico' ? 'badge-hist' : 'badge-cat';
        return `
          <div class="doc-card" data-category="${doc.category}">
            <h2 class="doc-title">${doc.title}</h2>
            <div class="doc-meta">
              <span class="badge badge-org">${doc.organization}</span>
              <span class="badge ${badgeClass}">${doc.category}</span>
              <span class="badge badge-date">${doc.date}</span>
            </div>
            <p class="doc-desc">${doc.description || ''}</p>
            <a href="${doc.url}" target="_blank" class="doc-link">Ver Documento →</a>
          </div>
        `;
      }).join('');
    }

    function filterDocs() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const category = document.getElementById('categoryFilter').value;

      const filtered = allDocuments.filter(doc => {
        const matchesSearch = doc.title.toLowerCase().includes(searchTerm) || 
                              (doc.description && doc.description.toLowerCase().includes(searchTerm));
        const matchesCategory = category === 'all' || doc.category === category;
        return matchesSearch && matchesCategory;
      });

      renderDocuments(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterDocs);
    document.getElementById('categoryFilter').addEventListener('change', filterDocs);

    fetchData();
  </script>
</body>
</html>
